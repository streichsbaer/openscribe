site_name: OpenScribe
site_description: Fast, local speech-to-text for macOS
site_url: https://openscribe.dev/
repo_url: https://github.com/streichsbaer/openscribe
repo_name: streichsbaer/openscribe
edit_uri: edit/main/site-docs/

docs_dir: site-docs
site_dir: site

theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  logo: images/logo-dark.svg
  favicon: images/logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

hooks:
  - site-docs/hooks/cache_bust_assets.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/home-carousel.js

nav:
  - Home: index.md
  - Guides:
    - Getting Started: guides/getting-started.md
    - How It Works: guides/how-it-works.md
    - Providers and Models: guides/providers.md
    - Custom Rules: guides/custom-rules.md
    - Your Data: guides/your-data.md
  - Project:
    - Overview: product/index.md
    - Product Spec: product/spec.md
    - Roadmap: product/roadmap.md
    - Contributing: product/contributing.md
    - Governance: reference/governance.md
  - Reference:
    - UI Reference: reference/ui-reference.md
    - Technical:
      - Storage Contract: reference/storage-contract.md
      - Popover Contract: reference/popover-contract.md
      - Development Setup: reference/development-setup.md
    - Operations:
      - Testing: ops/testing.md
      - Release: ops/release.md
      - Issue Tracking: ops/issue-tracking.md
      - Label Conventions: ops/label-conventions.md
